[project]
name = "myquant"
timezone = "America/Toronto"
python_version = "3.12"
data_start_date = "2006-01-01"

[data]
provider = "yfinance"
storage_format = "parquet"
price_field = "adj_close"

[targets]
primary_horizon_days = 5
benchmark_horizon_days = 1
label_mode = "ternary_quantile"
train_quantiles = [0.3333333333, 0.6666666667]
labels = ["down", "flat", "up"]

[events]
vix_thresholds = [0.10, 0.20]

[evaluation]
metrics = [
  "log_loss",
  "balanced_accuracy",
  "brier_score",
  "directional_hit_rate",
]
event_slices = [
  "vix_abs_10pct_flag",
  "vix_abs_20pct_flag",
]

[panel_training]
target_tickers = [
  "SPY",
  "XLB",
  "XLE",
  "XLF",
  "XLI",
